# ── Ports ──────────────────────────────────────────────────────────────────
http_port 3128

# ── ACLs ───────────────────────────────────────────────────────────────────
acl localnet src 10.0.0.0/8
acl localnet src 172.16.0.0/12
acl localnet src 192.168.0.0/16
acl localnet src fc00::/7
acl localnet src fe80::/10

acl SSL_ports  port 443
acl SSL_ports  port 8443
acl Safe_ports port 80
acl Safe_ports port 21
acl Safe_ports port 22
acl Safe_ports port 443
acl Safe_ports port 8443
acl Safe_ports port 4317   # OTLP gRPC
acl Safe_ports port 4318   # OTLP HTTP
acl Safe_ports port 1025-65535  # High ports (unregistered)

acl CONNECT method CONNECT

# Block list
acl blocked_domains dstdomain example.com

# ── Allow/Deny rules ───────────────────────────────────────────────────────
http_access deny !Safe_ports
http_access deny CONNECT !SSL_ports

# Block the domains first, before any allow rules
http_access deny blocked_domains

http_access allow localhost manager
http_access deny  manager
http_access allow localnet
http_access allow localhost
http_access deny  all

# ── Forwarding ─────────────────────────────────────────────────────────────
forwarded_for off                    # Strip client IP from X-Forwarded-For
via off                              # Remove Via header

# ── Cache (disabled — forward proxy only) ──────────────────────────────────
cache deny all
cache_mem 64 MB

# ── Logging ────────────────────────────────────────────────────────────────

logformat otel_json {"ts":"%ts.%03tu", \
"client":"%>a", \
"method":"%rm", \
"url":"%ru", \
"scheme":"%>rs", \
"status":"%<Hs", \
"squid_result":"%Ss/%<Hs", \
"req_bytes":"%>st", \
"resp_bytes":"%<st", \
"user_agent":"%{User-Agent}>h", \
"referer":"%{Referer}>h", \
"req_content_type":"%{Content-Type}>h", \
"resp_content_type":"%{Content-Type}<h", \
"x_forwarded_for":"%{X-Forwarded-For}>h", \
"host":"%{Host}>h", \
"accept":"%{Accept}>h", \
"cache_control":"%{Cache-Control}>h", \
"authorization":"%{Authorization}>h", \
"resp_cache_control":"%{Cache-Control}<h", \
"resp_content_length":"%{Content-Length}<h", \
"via":"%{Via}<h"}

access_log /var/log/squid/access.log otel_json
cache_log  /var/log/squid/cache.log
logfile_rotate 7

# ── DNS ────────────────────────────────────────────────────────────────────
dns_v4_first on