# OTLP Collector Config with HTTP Exporter
# Ref:
#  https://opentelemetry.io/docs/collector/configuration/
#  https://github.com/open-telemetry/opentelemetry-collector/tree/main/exporter/otlphttpexporter
#  https://github.com/open-telemetry/opentelemetry-collector/blob/main/examples/local/otel-config.yaml

extensions:
  health_check:
    endpoint: 0.0.0.0:13133
#  pprof:
#    endpoint: 0.0.0.0:1777
#  zpages:
#    endpoint: 0.0.0.0:55679

  #https://github.com/open-telemetry/opentelemetry-collector-contrib/blob/main/extension/oauth2clientauthextension/README.md
  oauth2client:
    client_id: ${env:OAUTH_CLIENT_ID}  # <-- Your client id
    client_secret: ${env:OAUTH_CLIENT_SECRET}       # <-- Your client secret, from environment
    token_url: ${env:OAUTH_TOKEN_URL}
    endpoint_params:
      audience: https://telemetry.channelseal.com
      grant_type: client_credentials
      scope: import:telemetry

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  filter/http_only: # Drop everything that does NOT look like an HTTP log
    error_mode: ignore
    logs:
      log_record:
        - 'attributes["http.method"] == nil'
  attributes/global:
    actions:
      - key: service.environment
        value: production
        action: upsert
  memory_limiter:
    check_interval: 5s
    limit_percentage: 75
    spike_limit_percentage: 15
  batch:
    send_batch_max_size: 8192
    send_batch_size: 2048
    timeout: 5s
    metadata_keys:
      - cs-org-id           # preserve this metadata key for the pipeline

exporters:
  otlphttp:
    endpoint: ${env:EXPORTER_ENDPOINT}
    headers:
      CS-Org-Id: "10000000"     # <-- Your ChannelSeal Organization Id
    auth:
      authenticator: oauth2client
    tls:
      insecure: false
    timeout: 10s
    read_buffer_size: 123
    write_buffer_size: 345
    sending_queue:
      enabled: true
      num_consumers: 2
      queue_size: 10
    retry_on_failure:
      enabled: true
      initial_interval: 10s
      randomization_factor: 0.7
      multiplier: 1.3
      max_interval: 60s
      max_elapsed_time: 10m
    compression: gzip
  debug:
    verbosity: normal  # or detailed / basic

service:
  telemetry:
    logs:
      level: info
#    metrics:
#      address: 0.0.0.0:8888   # Prometheus scrape target for collector self‑metrics[web:68]
  extensions: [health_check, oauth2client] #pprof, zpages
  pipelines:
    logs:
      receivers: [otlp]
      processors: [filter/http_only, attributes/global, memory_limiter, batch]
      exporters: [otlphttp, debug]
    traces:
      receivers: [otlp]
      processors: [filter/http_only, attributes/global, memory_limiter, batch]
      exporters: [otlphttp, debug]
