
services:
  cs-otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: cs-otel-collector
    command: ["--config=/etc/otelcol/config.yaml"]
    volumes:
      - ./otel-collector-config.yaml:/etc/otelcol/config.yaml:ro
      - ./security/cs-ca.pem:/etc/otelcol/cs-ca.pem:ro
    ports:
      # OTLP HTTP receiver for your apps to send logs
      - "4317:4317"
      - "4318:4318"
      # Optional: health/metrics/etc if you add these in the config
      - "13133:13133" # health_check extension
      - "8888:8888"   # Collector metrics
    restart: unless-stopped
    env_file:
      - ./.env